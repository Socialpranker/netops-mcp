<svg viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace" role="img" aria-label="netops-mcp — local-first network diagnostics for your AI. A verdict, not a data dump.">
  <!-- критика прошлой версии: Иерархия2 Исполнение1 Сдержанность2 (текст налезал на бейджи, дубль /etc/hosts, стрелка в пустоту, 6 уровней). Этот заход: 3 уровня (mark+wordmark / tagline / живой вердикт), слои живут в mark — не дублируются текстом, стрелка указывает в подсвеченный бар. -->
  <defs>
    <linearGradient id="verdict" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Surface: GitHub-dark, tinted (not flat #000). Single accent hairline at top. -->
  <rect x="0" y="0" width="1280" height="640" fill="#0D1117"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#verdict)"/>

  <!-- The mark: 4 layer bars, 3rd highlighted, verdict arrow pointing INTO it.
       Bars end at x=86; arrowhead tip sits at x=95 — a hair's gap reads as
       "points at this layer", not "skewers it". -->
  <g transform="translate(140,238) scale(2.3)">
    <rect x="0" y="0"  width="86" height="13" rx="3.5" fill="#8B949E"/>
    <rect x="0" y="20" width="86" height="13" rx="3.5" fill="#8B949E"/>
    <rect x="0" y="40" width="86" height="13" rx="3.5" fill="url(#verdict)"/>
    <rect x="0" y="60" width="86" height="13" rx="3.5" fill="#8B949E"/>
    <g stroke="url(#verdict)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="130" y1="46.5" x2="97" y2="46.5"/>
      <path d="M108 38.5 L96 46.5 L108 54.5"/>
    </g>
  </g>

  <!-- Wordmark + single tagline line. No letter-spacing crush on mono.
       Sizes kept so the longest line (tagline) clears the right edge. -->
  <g transform="translate(470,0)">
    <text x="0" y="252" fill="#F0F6FC" font-size="88" font-weight="800">netops<tspan fill="#8B949E">-</tspan>mcp</text>
    <text x="4" y="308" fill="#C9D1D9" font-size="26" font-weight="600">Local-first network diagnostics for your AI.</text>
  </g>

  <!-- The one verdict line — the whole point. Accent bar = the highlighted layer
       above, made concrete: a real config_correlate finding. -->
  <g transform="translate(140,500)">
    <rect x="0" y="-26" width="6" height="44" rx="3" fill="url(#verdict)"/>
    <text x="24" y="-1" font-size="23">
      <tspan fill="#7EE787" font-weight="700">It's your side.</tspan><tspan fill="#8B949E" font-weight="500"> /etc/hosts pins the domain to a dead IP. The site is fine.</tspan>
    </text>
  </g>

  <text x="1130" y="600" fill="#6E7681" font-size="20" text-anchor="end">github.com/Socialpranker/netops-mcp</text>
</svg>
