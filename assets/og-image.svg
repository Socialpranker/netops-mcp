<svg viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace" role="img" aria-label="netops-mcp — local-first network diagnostics for your AI. A verdict, not a data dump.">
  <defs>
    <linearGradient id="verdict" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="bgfade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#10141C"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bgfade)"/>
  <g stroke="#161B22" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>
  <rect x="0" y="0" width="1280" height="5" fill="url(#verdict)"/>

  <!-- big mark -->
  <g transform="translate(120,210) scale(2.4)">
    <rect x="0" y="0"  width="86" height="13" rx="3.5" fill="#8B949E"/>
    <rect x="0" y="20" width="86" height="13" rx="3.5" fill="#8B949E"/>
    <rect x="0" y="40" width="86" height="13" rx="3.5" fill="url(#verdict)"/>
    <rect x="0" y="60" width="86" height="13" rx="3.5" fill="#8B949E"/>
    <g stroke="url(#verdict)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="138" y1="46.5" x2="100" y2="46.5"/>
      <path d="M111 38 L99 46.5 L111 55"/>
    </g>
  </g>

  <!-- text block -->
  <g transform="translate(520,0)">
    <text x="0" y="240" fill="#F0F6FC" font-size="92" font-weight="800" letter-spacing="-2">netops<tspan fill="#8B949E">-</tspan>mcp</text>
    <text x="4" y="298" fill="#C9D1D9" font-size="27" font-weight="600">Local-first network diagnostics for your AI.</text>
    <text x="4" y="336" fill="#22D3EE" font-size="27" font-weight="700">A verdict — not a data dump.</text>

    <g transform="translate(4,392)" font-size="22" font-weight="700">
      <g>
        <rect x="0" y="0" width="74" height="40" rx="8" fill="#161B22" stroke="#30363D"/>
        <text x="37" y="27" fill="#8B949E" text-anchor="middle">DNS</text>
      </g>
      <g transform="translate(90,0)">
        <rect x="0" y="0" width="74" height="40" rx="8" fill="#161B22" stroke="#30363D"/>
        <text x="37" y="27" fill="#8B949E" text-anchor="middle">TCP</text>
      </g>
      <g transform="translate(180,0)">
        <rect x="0" y="0" width="74" height="40" rx="8" fill="#161B22" stroke="#30363D"/>
        <text x="37" y="27" fill="#8B949E" text-anchor="middle">TLS</text>
      </g>
      <g transform="translate(270,0)">
        <rect x="0" y="0" width="84" height="40" rx="8" fill="#161B22" stroke="#30363D"/>
        <text x="42" y="27" fill="#8B949E" text-anchor="middle">HTTP</text>
      </g>
      <g transform="translate(374,0)">
        <rect x="0" y="0" width="118" height="40" rx="8" fill="#161B22" stroke="#7C3AED"/>
        <text x="59" y="27" fill="#A371F7" text-anchor="middle">+ /etc/hosts</text>
      </g>
    </g>
  </g>

  <!-- bottom verdict line -->
  <g transform="translate(120,540)">
    <rect x="-4" y="-25" width="18" height="42" rx="3" fill="url(#verdict)"/>
    <text x="30" y="-2" fill="#7EE787" font-size="21" font-weight="600">It's YOUR side</text>
    <text x="196" y="-2" fill="#8B949E" font-size="21">— /etc/hosts:2 pins it to a stale address. The site is live elsewhere.</text>
  </g>

  <text x="1160" y="600" fill="#6E7681" font-size="20" text-anchor="end">github.com/Socialpranker/netops-mcp · MCP stdio · Node ≥20</text>
</svg>
