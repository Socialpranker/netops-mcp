<svg width="466" height="120" viewBox="0 0 466 120" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace" role="img" aria-label="netops-mcp — a verdict, not a data dump">
  <title>netops-mcp</title>
  <desc>Four stacked network-layer bars (DNS, TCP, TLS, HTTP); one bar is highlighted and a verdict arrow points into it — the tool tells you which layer the fault is on.</desc>
  <defs>
    <linearGradient id="verdict" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- Wordmark colour follows the viewer's theme. GitHub honours prefers-color-scheme
       for inline SVG; in an <img> the browser still applies it. Falls back to the
       light value when a renderer ignores @media. -->
  <style>
    .wordmark { fill: #1F2328; }
    @media (prefers-color-scheme: dark) { .wordmark { fill: #F0F6FC; } }
  </style>

  <!-- The mark: 4 layer bars, 3rd highlighted, verdict arrow into it.
       Neutral grey bars read on both light and dark backgrounds;
       the gradient is reserved for the verdict (the highlighted layer + arrow). -->
  <g transform="translate(12,22)">
    <rect x="0" y="0"  width="86" height="13" rx="3.5" fill="#8B949E"/>
    <rect x="0" y="20" width="86" height="13" rx="3.5" fill="#8B949E"/>
    <rect x="0" y="40" width="86" height="13" rx="3.5" fill="url(#verdict)"/>
    <rect x="0" y="60" width="86" height="13" rx="3.5" fill="#8B949E"/>
    <g stroke="url(#verdict)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="138" y1="46.5" x2="100" y2="46.5"/>
      <path d="M111 38 L99 46.5 L111 55"/>
    </g>
  </g>

  <!-- Wordmark adapts to theme via .wordmark class; dash + tagline stay neutral grey. -->
  <text x="182" y="58" class="wordmark" font-size="40" font-weight="800" letter-spacing="-0.5">netops<tspan fill="#8B949E">-</tspan>mcp</text>
  <text x="184" y="82" fill="#8B949E" font-size="13.5" letter-spacing="0.3">a verdict, not a data dump</text>
</svg>
