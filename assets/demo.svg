<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 388" width="680" role="img" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <title>netops-mcp demo</title>
  <desc>Claude diagnoses an unreachable host and finds a stale /etc/hosts pin in one net_diagnose call.</desc>
  <style>
    @keyframes type{0%{transform:translateX(0)}14%,100%{transform:translateX(452px)}}
    @keyframes k1{0%,17%{opacity:0;transform:translateY(6px)}21%,94%{opacity:1;transform:translateY(0)}100%{opacity:0}}
    @keyframes k2{0%,27%{opacity:0;transform:translateY(6px)}31%,94%{opacity:1;transform:translateY(0)}100%{opacity:0}}
    @keyframes k3{0%,37%{opacity:0;transform:translateY(6px)}41%,94%{opacity:1;transform:translateY(0)}100%{opacity:0}}
    @keyframes kv{0%,49%{opacity:0;transform:translateY(8px)}55%,94%{opacity:1;transform:translateY(0)}100%{opacity:0}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .type{animation:type 14s infinite linear}
    .r1{animation:k1 14s infinite}.r2{animation:k2 14s infinite}.r3{animation:k3 14s infinite}
    .v{animation:kv 14s infinite}.cur{animation:blink 1.1s steps(1) infinite}
  </style>

  <rect x="6" y="6" width="668" height="372" rx="12" fill="#0d1117" stroke="#30363d"/>
  <circle cx="28" cy="28" r="5" fill="#ff5f56"/>
  <circle cx="46" cy="28" r="5" fill="#febc2e"/>
  <circle cx="64" cy="28" r="5" fill="#28c840"/>
  <text x="340" y="32" text-anchor="middle" font-size="12" fill="#8b949e">netops-mcp</text>
  <line x1="6" y1="50" x2="674" y2="50" stroke="#21262d"/>

  <text x="24" y="84" font-size="15" fill="#7ee787">❯</text>
  <text x="44" y="84" font-size="15" fill="#e6edf3">why can't I reach api.acme.dev?</text>
  <rect class="cur" x="318" y="70" width="8" height="18" fill="#7ee787"/>
  <rect class="type" x="40" y="64" width="392" height="28" fill="#0d1117"/>

  <g class="r1" font-size="14">
    <text x="24" y="128" fill="#58a6ff">net_diagnose<tspan fill="#6e7681">   </tspan><tspan fill="#8b949e">DNS </tspan><tspan fill="#3fb950">✓</tspan><tspan fill="#8b949e">  TCP </tspan><tspan fill="#f85149">✗ timeout @10.0.0.5</tspan></text>
  </g>
  <g class="r2" font-size="14">
    <text x="24" y="162" fill="#58a6ff">net_triangulate<tspan fill="#8b949e">   you </tspan><tspan fill="#f85149">✗</tspan><tspan fill="#8b949e">   US </tspan><tspan fill="#3fb950">✓</tspan><tspan fill="#8b949e">  EU </tspan><tspan fill="#3fb950">✓</tspan><tspan fill="#8b949e">  Asia </tspan><tspan fill="#3fb950">✓</tspan></text>
  </g>
  <g class="r3" font-size="14">
    <text x="24" y="196" fill="#58a6ff">config_correlate<tspan fill="#8b949e">  /etc/hosts:12  api.acme.dev → </tspan><tspan fill="#d29922">10.0.0.5</tspan></text>
  </g>

  <g class="v">
    <rect x="24" y="212" width="632" height="150" rx="10" fill="#161b22" stroke="#30363d"/>
    <rect x="24" y="224" width="4" height="126" fill="#d29922"/>
    <text x="46" y="248" font-size="15" font-weight="500" fill="#d29922">❯ It's your side.</text>
    <text x="46" y="282" font-size="14" fill="#c9d1d9">/etc/hosts line 12 pins api.acme.dev → 10.0.0.5 (stale).</text>
    <text x="46" y="308" font-size="14" fill="#c9d1d9">It's live from US, EU &amp; Asia — remove that line.</text>
    <text x="46" y="342" font-size="12" fill="#8b949e">— resolved in one net_diagnose call · local-first · zero telemetry</text>
  </g>
</svg>
