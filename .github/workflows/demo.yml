name: regenerate demo gif

# Re-renders assets/cli.gif from demo/demo.tape using the real CLI.
# Run manually from the Actions tab, or on changes to the demo.
on:
  workflow_dispatch:
  push:
    paths:
      - "demo/**"
      - "src/**"
      - ".github/workflows/demo.yml"

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci && npm run build
      - uses: charmbracelet/vhs-action@v2
        with:
          path: demo/demo.tape
      - name: commit refreshed gif
        run: |
          if ! git diff --quiet -- assets/cli.gif; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/cli.gif
            git commit -m "chore: regenerate demo gif [skip ci]"
            git push
          fi
