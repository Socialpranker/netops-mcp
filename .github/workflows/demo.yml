name: regenerate demo gif

# Re-renders assets/cli.gif from demo/demo.tape using the real CLI.
# Run manually from the Actions tab (the VHS action installs ffmpeg/ttyd,
# which is too heavy and flaky to run on every push).
on:
  workflow_dispatch:

jobs:
  vhs:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # bot commits the regenerated gif back to the branch — nothing else
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - run: npm ci && npm run build
      - uses: charmbracelet/vhs-action@v2
        with:
          path: demo/demo.tape
      - name: commit refreshed gif
        env:
          REF_NAME: ${{ github.ref_name }}   # branch the run was triggered from; via env to avoid run-block injection
        run: |
          if ! git diff --quiet -- assets/cli.gif; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/cli.gif
            git commit -m "chore: regenerate demo gif [skip ci]"
            git push origin "HEAD:$REF_NAME"   # push back to the same branch, never a guessed default
          fi
