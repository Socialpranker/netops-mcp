name: regenerate demo gif

# Re-renders assets/cli.gif from demo/demo.tape using the real CLI.
# Run manually from the Actions tab (the VHS action installs ffmpeg/ttyd,
# which is too heavy and flaky to run on every push).
on:
  workflow_dispatch:

jobs:
  vhs:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # bot commits the regenerated gif back to the branch — nothing else
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - run: npm ci && npm run build
      # charmbracelet/vhs-action@v2 is broken (issue #459: bundled ffmpeg installer
      # 404s on a removed BtbN build), so install the toolchain by hand instead.
      - name: install vhs toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg ttyd
          curl -fsSL -o /tmp/vhs.deb https://github.com/charmbracelet/vhs/releases/download/v0.11.0/vhs_0.11.0_amd64.deb
          sudo dpkg -i /tmp/vhs.deb
          vhs --version
      - name: render demo gif
        run: vhs demo/demo.tape
      - name: commit refreshed gif
        env:
          REF_NAME: ${{ github.ref_name }}   # branch the run was triggered from; via env to avoid run-block injection
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, THEN check the index — plain `git diff` misses an untracked
          # (never-before-committed) cli.gif, so the first render would never commit.
          git add assets/cli.gif
          if ! git diff --cached --quiet -- assets/cli.gif; then
            git commit -m "chore: regenerate demo gif [skip ci]"
            git push origin "HEAD:$REF_NAME"   # push back to the same branch, never a guessed default
          else
            echo "cli.gif unchanged — nothing to commit"
          fi
